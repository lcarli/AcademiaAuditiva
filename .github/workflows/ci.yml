name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, "feat/**"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AcademiaAuditiva.sln

      - name: Build
        run: dotnet build AcademiaAuditiva.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AcademiaAuditiva.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/**/*"

  bicep-validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep
        run: |
          az bicep install
          az bicep build --file infra/main.bicep
