name: CD - Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - "AcademiaAuditiva/**"
      - "infra/**"
      - "Dockerfile"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-aa-prd
  CONTAINER_APP: ca-aa-prd
  IMAGE_NAME: academiaauditiva
  ACR_NAME: ${{ vars.ACR_NAME }}

jobs:
  build-and-deploy:
    name: Build image, push, deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE_TAG"

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show -n ${{ env.CONTAINER_APP }} -g ${{ env.RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)
          for i in {1..30}; do
            if curl -fsS "https://$FQDN/health/live" >/dev/null; then
              echo "Live OK"; break
            fi
            sleep 5
          done
          curl -fsS "https://$FQDN/health/ready" || (echo "Readiness failed"; exit 1)
